version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: ApiForge.Api/Dockerfile
    container_name: apiforge-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout:  5s
      retries:  3
    restart: unless-stopped

